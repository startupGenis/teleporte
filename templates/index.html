<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Login Admin - TelePorte</title>
  <style>
    body {
      background: #0D1B2A;
      color: #E0E1DD;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1B263B;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h2 {
      margin: 0 0 20px 0;
      color: #2EC4B6;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #2EC4B6;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #0D1B2A;
      border-radius: 6px;
      background: #0D1B2A;
      color: #E0E1DD;
      font-size: 16px;
      outline: none;
    }
    button {
      background: #2EC4B6;
      color: #0D1B2A;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">TelePorte</div>
    <h2>🔐 Área Administrativa</h2>
    <p>Autenticação segura com sessão temporária</p>
    <form method="post" autocomplete="off" novalidate>
      <input 
        type="password" 
        name="password" 
        placeholder="Senha administrativa" 
        required 
        autocomplete="off"
        onpaste="return false"
        oncopy="return false"
        oncut="return false"
        oncontextmenu="return false"
      >
      <button type="submit">Entrar</button>
    </form>
    <div class="footer">
      © 2025 TelePorte. Todos os direitos reservados.
    </div>
  </div>
</body>
</html>
