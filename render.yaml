services:
  # === 1. PocketBase: Banco de Dados + Auth ===
  - type: web
    name: teleporte-pb
    plan: free
    runtime: go
    region: oregon
    env: production
    buildCommand: ""
    startCommand: ./pocketbase serve --http=0.0.0.0:${PORT}
    envVars:
      - key: PORT
        value: ${PORT}
    # Disco persistente para salvar coleções, arquivos e backups
    disk:
      name: pb_data
      mountPath: /pb_data
    # Health check
    healthCheckPath: /api/health

  # === 2. Flask: Admin + API de Mapas ===
  - type: web
    name: teleporte-backend
    plan: free
    runtime: python
    region: oregon
    env: production
    # Instala dependências do requirements.txt
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: ${PORT}
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        fromSecret: ADMIN_PASSWORD_HASH
      - key: POCKETBASE_URL
        value: https://teleporte-pb.onrender.com
    # Health check
    healthCheckPath: /
